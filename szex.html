<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button with Audio</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: lightgreen;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: darkgreen;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button onclick="toggleAudio()">szex</button>
    <audio id="audio" src="./kicsi.wav"></audio>

    <script>
        function toggleAudio() {
            var audio = document.getElementById('audio');
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
                audio.currentTime = 0;
            }
        }
    </script>
</body>
</html>
